info:
  name: Sign In
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/auth/sign-in/email"
  headers:
    - name: Origin
      value: "{{baseUrl}}"
  body:
    type: json
    data: |
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
