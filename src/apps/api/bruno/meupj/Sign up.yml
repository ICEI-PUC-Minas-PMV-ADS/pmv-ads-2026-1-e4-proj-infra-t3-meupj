info:
  name: Sign up
  type: http
  seq: 5

http:
  method: POST
  url: "{{baseUrl}}/api/auth/sign-up/email"
  headers:
    - name: Origin
      value: "{{baseUrl}}"
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}",
        "name": "{{name}}"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
